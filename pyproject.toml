[tool.ruff]
exclude = [".reference", "downloads"]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "SIM", "UP"]

[tool.pyright]
exclude = [".reference", "downloads"]
include = ["app.py", "config.py", "test_app.py"]
pythonVersion = "3.10"
typeCheckingMode = "standard"
